# Apify integration retired — the project now uses the free google-play-scraper
# library directly (see fetch_reviews.py). This block is kept only for
# backwards compatibility with old CLI invocations and is ignored.

apps:
  - com.whatsapp
  - com.pilav.kismet
  - com.mandir

filters:
  country: us
  language: en
  sort: newest               # newest | rating | helpful
  min_rating: 1
  max_rating: 5
  since: "2025-01-01"        # ISO date; null to disable
  max_reviews_per_app: 5000

output:
  db_path: reviews.db
